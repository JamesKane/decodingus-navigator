# CPU baseline for the shipped x86-64 slices: Ivy Bridge (= x86-64-v2 + AVX), the documented
# reference floor (Mac Pro 2013 / Xeon E5 v2). See docs/design/simd-optimization-targets.md and
# packaging-and-release.md. NEVER raise to x86-64-v3 — AVX2/FMA SIGILL on the baseline. ARM /
# Apple-Silicon slices are untouched (NEON is always present), so a native aarch64 dev build here
# is unaffected by these blocks. Any future hand-vectorized AVX2 path must use runtime feature
# detection with a scalar/SSE fallback, never a compile-time v3 floor.
[target.x86_64-apple-darwin]
rustflags = ["-C", "target-cpu=ivybridge"]

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=ivybridge"]

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-cpu=ivybridge"]
