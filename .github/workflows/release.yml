# Release pipeline for the Rust `navigator` desktop app (replaces the legacy Scala jpackage
# workflow). Builds OS-native installer images with cargo-packager on a tag push and attaches
# them — plus a SHA256SUMS — to a GitHub release. See docs/design/packaging-and-release.md.
#
# The Ivy Bridge CPU floor for the x86-64 slices comes from .cargo/config.toml (per-target
# rustflags), so no per-job RUSTFLAGS are needed; ARM slices stay at the NEON baseline.
#
# AUTHORED BUT NOT YET RUN END-TO-END — items flagged TODO need a real tagged CI run / secrets:
#   - macOS notarization (APPLE_* secrets) and the universal2 (lipo) build.
#   - Linux glibc floor (ubuntu-22.04 = glibc 2.35; use an old-glibc container or cargo-zigbuild
#     `*.2.28` for "Ivy Bridge or newer" reach — see design §1).
#   - Windows is shipped UNSIGNED for Alpha (documented SmartScreen work-around).
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  package:
    name: package (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
          - label: macos-x86_64
            os: macos-13 # Intel runner; target-cpu=ivybridge via .cargo/config.toml
            target: x86_64-apple-darwin
          - label: linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - label: linux-aarch64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - label: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # AppImage/.deb tooling for the Linux slices.
      - name: Linux packaging deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libayatana-appindicator3-dev librsvg2-dev file

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      # Stage the bundled ancestry assets. TODO(CI): point NAVIGATOR_ASSET_SRC at a CDN mirror or a
      # cached artifact; without it the bundle is empty and first run has no offline assets.
      - name: Stage assets
        shell: bash
        run: bash packaging/stage-assets.sh

      - name: Package
        run: cargo packager --release --target ${{ matrix.target }} --formats default -p navigator-ui
        # macOS signing/notarization (set the APPLE_* secrets to enable; left off until provisioned):
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Collect images
        shell: bash
        run: |
          mkdir -p out
          # cargo-packager writes images under target/<target>/release (dmg/AppImage/deb/nsis/zip).
          find target/${{ matrix.target }}/release -maxdepth 1 \
            \( -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \
               -o -name '*.exe' -o -name '*.msi' -o -name '*.zip' -o -name '*.tar.gz' \) \
            -exec cp {} out/ \; || true

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: out/*
          if-no-files-found: warn

  release:
    name: collect + release
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: images
          merge-multiple: true
      - name: SHA256SUMS
        run: |
          cd images
          sha256sum * > SHA256SUMS || shasum -a 256 * > SHA256SUMS
          cat SHA256SUMS
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: images/*
          # Alpha/beta/rc tags are prereleases.
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
